<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Campus - Admin Dashboard</title>
    <link rel="stylesheet" href="/css/dashboards.css">
    <style>
        .nav-links li { list-style: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .filter-group { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header">Smart Campus</div>
            <nav class="sidebar-nav">
                <a href="#" onclick="showTab('users')" class="active">Manage Users</a>
                <a href="#" onclick="showTab('schedules')">Teaching Schedule</a>
                <a href="#" onclick="showTab('notices')">Live Notices</a>
                <a href="#" onclick="showTab('blueprint')">Campus Blueprint</a>
                <a href="#" onclick="logout()" style="margin-top: 50px; color: #f87171;">Logout</a>
            </nav>
        </aside>

        <main class="main-content">
            <!-- Manage Users Tab -->
            <section id="users" class="tab-content active">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2>Manage Users</h2>
                    <button class="btn btn-accent" onclick="document.getElementById('add-user-modal').classList.remove('hidden')">+ Add User</button>
                </div>
                
                <div class="filter-group">
                    <label>Filter by Role: </label>
                    <select id="role-filter" class="form-control" style="width: 200px; display: inline-block;" onchange="loadUsers()">
                        <option value="All">All</option>
                        <option value="Student">Students</option>
                        <option value="Faculty">Faculty</option>
                        <option value="Worker">Workers</option>
                        <option value="Security Guard">Guards</option>
                    </select>
                </div>

                <div class="card">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="user-table-body">
                            <!-- Populated dynamically -->
                        </tbody>
                    </table>
                </div>
            </section>

            <!-- Schedules Tab -->
            <section id="schedules" class="tab-content">
                <h2>Teaching Schedule & Timetables</h2>
                <div class="card">
                    <p>Schedule management functionality will be implemented here.</p>
                </div>
            </section>

            <!-- Notices Tab -->
            <section id="notices" class="tab-content">
                <h2>Live Notices</h2>
                <div class="card">
                    <div class="form-group">
                        <label>Notice Broadcast</label>
                        <textarea class="form-control" rows="3" placeholder="Type notice to send to all users..."></textarea>
                    </div>
                    <button class="btn btn-accent">Publish Notice</button>
                </div>
            </section>

            <!-- Blueprint Tab -->
            <section id="blueprint" class="tab-content">
                <h2>Campus Blueprint</h2>
                <div class="card">
                    <label>Upload Campus Map (PDF/Image)</label><br><br>
                    <input type="file" class="form-control">
                    <br>
                    <button class="btn btn-accent">Upload Map</button>
                </div>
            </section>

        </main>
    </div>

    <!-- Modals -->
    <div id="add-user-modal" class="hidden" style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center;">
        <div class="card" style="width: 400px;">
            <h3>Add New User</h3>
            <form id="add-user-form">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="new-name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="new-email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Role</label>
                    <select id="new-role" class="form-control">
                        <option value="Student">Student</option>
                        <option value="Faculty">Faculty</option>
                        <option value="Worker">Worker</option>
                        <option value="Security Guard">Security Guard</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Temporary Password</label>
                    <input type="text" id="new-pwd" class="form-control" required>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button type="submit" class="btn btn-accent" style="flex: 1;">Create & Email</button>
                    <button type="button" class="btn" style="background: #e5e7eb; color: #333;" onclick="document.getElementById('add-user-modal').classList.add('hidden')">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Tab routing
        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.sidebar-nav a').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.target.classList.add('active');
        }

        // Check authentication
        const token = localStorage.getItem('sc_token');
        if(!token || localStorage.getItem('sc_role') !== 'Admin') {
            window.location.href = '/auth';
        }

        // Fetch users
        async function loadUsers() {
            const role = document.getElementById('role-filter').value;
            try {
                const res = await fetch(`/api/admin/users?role=${role}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const users = await res.json();
                
                const tbody = document.getElementById('user-table-body');
                tbody.innerHTML = '';
                users.forEach(u => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${u.name}</td>
                            <td>${u.email}</td>
                            <td><span class="role-badge">${u.role}</span></td>
                            <td>
                                <button class="btn" style="padding: 5px 10px; font-size: 0.8rem; background: #ef4444;" onclick="deleteUser('${u._id}')">Delete</button>
                            </td>
                        </tr>
                    `;
                });
            } catch(e) { console.error('Failed to load users'); }
        }

        async function deleteUser(id) {
            if(!confirm('Are you sure?')) return;
            await fetch(`/api/admin/users/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            loadUsers();
        }

        document.getElementById('add-user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById('new-name').value,
                email: document.getElementById('new-email').value,
                role: document.getElementById('new-role').value,
                password: document.getElementById('new-pwd').value
            };

            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerText = 'Creating...';

            try {
                const res = await fetch('/api/admin/users', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` 
                    },
                    body: JSON.stringify(payload)
                });
                if(res.ok) {
                    alert('User created and email sent!');
                    document.getElementById('add-user-modal').classList.add('hidden');
                    loadUsers();
                    e.target.reset();
                } else {
                    const data = await res.json();
                    alert(data.message);
                }
            } catch(e) { alert('Error adding user'); }
            btn.innerText = 'Create & Email';
        });

        function logout() {
            localStorage.clear();
            window.location.href = '/auth';
        }

        loadUsers();
    </script>
</body>
</html>
